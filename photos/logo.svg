    <linearGradient id="gc" x1="0" y1="0" x2="0" y2="90" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#F0DC98"/>
      <stop offset="100%" stop-color="#C8A050"/>
    </linearGradient>
  </defs>

  <!-- V faces (drawn first, bars appear on top) -->
