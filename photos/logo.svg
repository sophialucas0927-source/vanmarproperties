<svg viewBox="0 0 100 90" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gl" x1="0" y1="0" x2="50" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#D4B868"/>
      <stop offset="55%"  stop-color="#EDD890"/>
      <stop offset="100%" stop-color="#B89040"/>
    </linearGradient>
    <linearGradient id="gr" x1="50" y1="0" x2="100" y2="0" gradientUnits="userSpaceOnUse">
